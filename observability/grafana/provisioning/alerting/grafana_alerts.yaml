apiVersion: 1

groups:
  - orgId: 1
    name: Container Alerts
    folder: Home Lab
    interval: 1m
    rules:

      - uid: container-down-servarr
        title: "Container Down: servarr stack"
        condition: B
        for: 10m
        annotations:
          summary: "A servarr container is down"
          description: "One or more servarr containers (sonarr/radarr/prowlarr/lidarr/bazarr/qbittorrent/nzbget/gluetun/seerr/tautulli) have been absent for more than 10 minutes."
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "absent(container_last_seen{name=~\"sonarr|radarr|prowlarr|lidarr|bazarr|qbittorrent|nzbget|gluetun|seerr|tautulli\"})"
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last

