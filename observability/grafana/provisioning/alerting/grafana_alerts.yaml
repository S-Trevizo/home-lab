  - orgId: 1
    name: Servarr Host Alerts
    folder: Home Lab
    interval: 1m
    rules:

      - uid: servarr-disk-high
        title: "Servarr Disk Usage High"
        condition: B
        for: 5m
        annotations:
          summary: "Disk usage is above 85%"
          description: "A filesystem on servarr is above 85% full. Check Grafana dashboard for details."
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(1 - node_filesystem_avail_bytes{job=\"node_exporter_servarr\", fstype!~\"tmpfs|overlay\", mountpoint!~\"/boot.*\"} / node_filesystem_size_bytes{job=\"node_exporter_servarr\", fstype!~\"tmpfs|overlay\", mountpoint!~\"/boot.*\"}) * 100"
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last

      - uid: servarr-ram-high
        title: "Servarr RAM Usage High"
        condition: B
        for: 10m
        annotations:
          summary: "Servarr RAM usage is above 90%"
          description: "Servarr RAM usage has been above 90% for 10 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(1 - node_memory_MemAvailable_bytes{job=\"node_exporter_servarr\"} / node_memory_MemTotal_bytes{job=\"node_exporter_servarr\"}) * 100"
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last

      - uid: servarr-cpu-high
        title: "Servarr CPU Sustained High"
        condition: B
        for: 5m
        annotations:
          summary: "Servarr CPU usage is sustained above 80%"
          description: "Servarr CPU has been above 80% for 5 minutes."
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "100 - (avg by (instance) (rate(node_cpu_seconds_total{job=\"node_exporter_servarr\", mode=\"idle\"}[2m])) * 100)"
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 80
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last

