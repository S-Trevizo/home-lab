  - orgId: 1
    name: Prometheus Scrape Alerts
    folder: Home Lab
    interval: 1m
    rules:

      - uid: scrape-target-down
        title: "Prometheus Scrape Target Down"
        condition: B
        for: 3m
        annotations:
          summary: "A Prometheus scrape target is down"
          description: "Prometheus cannot reach one or more scrape targets for more than 3 minutes. Check Prometheus targets at http://192.168.1.49:9090/targets"
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "up == 0"
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - -1
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last