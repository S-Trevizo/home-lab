############################################################################
version: "2.4"
networks:
  firefly_iii:
    name: firefly_iii
    driver: bridge

services:
  app:
    image: fireflyiii/core:latest
    hostname: app
    container_name: firefly_iii_core
    restart: unless-stopped
    networks:
      - firefly_iii
    ports:
      - 8282:8080
    volumes:
      - ./upload:/var/www/html/storage/upload
    env_file: .env
    depends_on:
      - db

  db:
    image: mariadb:lts
    hostname: db
    container_name: firefly_iii_db
    restart: unless-stopped
    networks:
      - firefly_iii
    volumes:
      - ./db:/var/lib/mysql
    env_file: .db.env

  cron:
    image: alpine
    container_name: firefly_iii_cron
    restart: unless-stopped
    env_file: .env
    command: sh -c "
      apk add tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- http://app:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\"
      | crontab - && \
      crond -f -L /dev/stdout"
    networks:
      - firefly_iii
    depends_on:
      - app
