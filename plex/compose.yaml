services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=docker
      - PLEX_CLAIM=claim-UUBqtHRgnqmKVMQj57VF
    ports:
      - 32400:32400
    devices:
      - /dev/dri:/dev/dri # QuickSync
    volumes:
      - ./plex:/config
      - /home/xeon/data:/home/xeon/data
      - /usr/share/libdrm/amdgpu.ids:/usr/share/libdrm/amdgpu.ids:ro
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./overseer/config:/config
      - /home/xeon/data:/home/xeon/data
    ports:
      - 5055:5055
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./tautulli:/config
    ports:
      - 8181:8181
    restart: unless-stopped
