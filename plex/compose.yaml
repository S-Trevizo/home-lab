services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    env_file:
      - .env
    ports:
      - 32400:32400
    devices:
      - /dev/dri:/dev/dri # QuickSync
    volumes:
      - ./plex:/config
      - /home/xeon/data:/home/xeon/data
      - /usr/share/libdrm/amdgpu.ids:/usr/share/libdrm/amdgpu.ids:ro
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    env_file:
      - .env
    volumes:
      - ./overseer/config:/app/config
      - /home/xeon/data:/home/xeon/data
    ports:
      - 5055:5055
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    env_file:
      - .env
    volumes:
      - ./tautulli:/config
    ports:
      - 8181:8181
    restart: unless-stopped
